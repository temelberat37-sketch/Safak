

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora Adinda | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-darker: #0b0915; --bg-dark: #120f25; --bg-card: #1a162e;
            --primary: #8b5cf6; --text-main: #ffffff; --text-dim: #a1a1aa;
            --success: #22c55e; --border: #2d2847;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); overflow: hidden; display: flex; height: 100vh; }
        
        /* Kenar Çubuğu */
        .sidebar { width: 72px; background: var(--bg-darker); display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 15px; }
        .icon-btn { width: 48px; height: 48px; border-radius: 50%; background: #25213d; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; color: var(--text-dim); }
        .icon-btn:hover, .icon-btn.active { border-radius: 15px; background: var(--primary); color: white; }

        /* Navigasyon Paneli */
        .nav-panel { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-item { margin: 5px 10px; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text-dim); transition: 0.2s; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(139, 92, 246, 0.2); color: white; }
        .list-header { padding: 20px 15px 10px; font-size: 11px; font-weight: 800; color: var(--text-dim); }

        /* Ana İçerik */
        .main { flex: 1; display: flex; flex-direction: column; background: #131026; }
        .top-bar { height: 50px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); font-weight: 600; }
        
        /* Mesaj Alanı */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg-row { display: flex; gap: 15px; position: relative; }
        .msg-row:hover .tools { opacity: 1; }
        .tools { position: absolute; right: 20px; top: -10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 5px; display: flex; opacity: 0; transition: 0.1s; }
        .t-btn { padding: 5px 8px; cursor: pointer; color: var(--text-dim); font-size: 12px; }
        .t-btn:hover { color: white; background: var(--primary); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .m-user { font-weight: 700; font-size: 14px; color: var(--primary); margin-right: 10px; }
        .m-time { font-size: 11px; color: var(--text-dim); }
        .m-text { color: #dbdee1; margin-top: 5px; font-size: 15px; }
        .reply-tag { font-size: 12px; color: var(--text-dim); border-left: 2px solid var(--primary); padding-left: 8px; margin-bottom: 5px; font-style: italic; }

        /* Giriş */
        .footer { padding: 20px; }
        .reply-box { background: #1e1b33; padding: 8px 15px; border-radius: 8px 8px 0 0; display: none; justify-content: space-between; font-size: 13px; border-left: 4px solid var(--primary); }
        .in-wrap { background: #25213d; border-radius: 8px; display: flex; align-items: center; padding: 0 15px; }
        .in-wrap input { flex: 1; background: transparent; border: none; padding: 15px 0; color: white; outline: none; }

        /* Arkadaş Sayfası */
        #friends-view { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .f-card { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; }
        .f-info { display: flex; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="icon-btn" style="color:var(--primary); font-weight:bold;">NX</div>
        <div class="icon-btn active" onclick="showView('friends')"><i data-lucide="message-circle"></i></div>
        <div class="icon-btn"><i data-lucide="compass"></i></div>
    </nav>

    <aside class="nav-panel">
        <div class="nav-item active" id="f-tab" onclick="showView('friends')"><i data-lucide="users"></i> <span>Arkadaşlar</span></div>
        <div class="list-header">MESAJLAR</div>
        <div id="dm-list"></div>
    </aside>

    <main class="main">
        <header class="top-bar" id="h-text">Arkadaşlar</header>
        
        <div id="friends-view">
            <h3 style="margin-bottom:10px;">Çevrimiçi Arkadaşlar</h3>
            <div id="f-list"></div>
        </div>

        <div id="chat-view" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div class="chat-area" id="chat-root"></div>
            <div class="footer">
                <div id="reply-bar" class="reply-box">
                    <span id="reply-name"></span>
                    <i data-lucide="x" style="width:14px; cursor:pointer;" onclick="closeReply()"></i>
                </div>
                <div class="in-wrap">
                    <input type="text" id="m-input" placeholder="Mesaj gönder..." onkeydown="if(event.key==='Enter') send()">
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const users = [
            { id: '1', name: 'Demir Alp', color: '#ff5e5e' },
            { id: '2', name: 'Eylül Ada', color: '#5e72ff' }
        ];
        const chats = { '1': [], '2': [] };
        let activeId = null, replyTo = null, editId = null;

        function showView(v, id = null) {
            document.getElementById('friends-view').style.display = v === 'friends' ? 'flex' : 'none';
            document.getElementById('chat-view').style.display = v === 'chat' ? 'flex' : 'none';
            activeId = id;
            if(id) {
                document.getElementById('h-text').innerText = users.find(u => u.id === id).name;
                renderChat();
            } else {
                document.getElementById('h-text').innerText = 'Arkadaşlar';
                renderFriends();
            }
            renderNav();
        }

        function renderNav() {
            document.getElementById('dm-list').innerHTML = users.map(u => `
                <div class="nav-item ${activeId === u.id ? 'active' : ''}" onclick="showView('chat', '${u.id}')">
                    <div class="avatar" style="background:${u.color}; width:32px; height:32px; font-size:12px;">${u.name[0]}</div>
                    <span>${u.name}</span>
                </div>`).join('');
        }

        function renderFriends() {
            document.getElementById('f-list').innerHTML = users.map(u => `
                <div class="f-card">
                    <div class="f-info">
                        <div class="avatar" style="background:${u.color}">${u.name[0]}</div>
                        <div><div style="font-weight:600">${u.name}</div><div style="font-size:12px; color:var(--success)">Çevrimiçi</div></div>
                    </div>
                    <i data-lucide="message-square" style="cursor:pointer" onclick="showView('chat', '${u.id}')"></i>
                </div>`).join('');
            lucide.createIcons();
        }

        function renderChat() {
            const root = document.getElementById('chat-root');
            root.innerHTML = chats[activeId].map(m => `
                <div class="msg-row">
                    <div class="avatar" style="background:${m.me?'var(--primary)':users.find(u=>u.id===activeId).color}">${m.user[0]}</div>
                    <div style="flex:1">
                        <div><span class="m-user">${m.user}</span><span class="m-time">${m.time}</span></div>
                        ${m.reply ? `<div class="reply-tag"># ${m.reply} yanıtlandı</div>` : ''}
                        <div class="m-text">${m.text}</div>
                    </div>
                    <div class="tools">
                        <div class="t-btn" onclick="initReply('${m.user}')">Yanıtla</div>
                        ${m.me ? `<div class="t-btn" onclick="initEdit(${m.id},'${m.text}')">Düzenle</div>
                        <div class="t-btn" onclick="del(${m.id})">Sil</div>`:''}
                    </div>
                </div>`).join('');
            root.scrollTop = root.scrollHeight;
            lucide.createIcons();
        }

        function send() {
            const inp = document.getElementById('m-input');
            if(!inp.value.trim()) return;
            const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            if(editId) {
                chats[activeId].find(x => x.id === editId).text = inp.value;
                editId = null;
            } else {
                chats[activeId].push({ id:Date.now(), user:'Siz', text:inp.value, time:t, me:true, reply:replyTo });
            }
            inp.value = ''; closeReply(); renderChat();
        }

        function initReply(u) { replyTo = u; document.getElementById('reply-bar').style.display = 'flex'; document.getElementById('reply-name').innerText = u + ' yanıtlanıyor...'; }
        function closeReply() { replyTo = null; document.getElementById('reply-bar').style.display = 'none'; }
        function del(id) { chats[activeId] = chats[activeId].filter(x => x.id !== id); renderChat(); }
        function initEdit(id, t) { editId = id; document.getElementById('m-input').value = t; document.getElementById('m-input').focus(); }

        renderNav(); renderFriends();
    </script>
</body>
        </html>
