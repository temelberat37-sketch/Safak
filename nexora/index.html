<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a0f2e;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #2a1748;
  box-sizing: border-box;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: #b084ff;
}

nav {
  display: flex;
  gap: 15px;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
  padding: 6px 10px;
  border-radius: 6px;
  transition: 0.3s;
}

nav a:hover {
  background: #6a3df0;
}

.container {
  margin-top: 80px;
  padding: 20px;
  max-width: 600px;
}

h1 {
  color: #b084ff;
}

p {
  opacity: 0.8;
}

.buttons {
  margin-top: 25px;
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

.login {
  background: #6a3df0;
  color: white;
}

.register {
  background: transparent;
  border: 2px solid #6a3df0;
  color: #6a3df0;
}

.btn:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

@media (max-width: 600px) {
  nav {
    display: none;
  }
}

  </style>
</head>
<body>  <header>
    <div class="logo">Nexora</div>
    <nav>
      <a href="#">Ana Sayfa</a>
      <a href="#">Özellikler</a>
      <a href="#">Hakkında</a>
    </nav>
  </header>  <div class="container">
    <h1>Nexora ile Yeni Nesil Sohbet</h1>
    <p>
      Nexora, arkadaşlarınla hızlı, güvenli ve modern bir şekilde iletişim kurmanı sağlayan
      yeni nesil bir sohbet platformudur.
    </p><div class="buttons">
  <button class="btn login" onclick="window.location.href='giris.html'">Giriş</button>
  <button class="btn register" onclick="window.location.href='giris.html'">Kayıt Ol</button>
</div>

  </div></body>
    </html>
