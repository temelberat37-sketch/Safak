<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora App</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#1a0f2e;color:#fff;overflow:hidden;height:100vh;display:flex}/* LEFT BAR */ .leftbar{ width:90px; background:#120a24; display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:10px; }

.menuBtns{ display:flex; flex-direction:column; gap:10px; margin-bottom:10px; }

.menuBtn{ width:44px; height:44px; border-radius:50%; background:#2a1748; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:11px; transition:.2s; } .menuBtn:hover{transform:scale(1.05);background:#6a3df0}

.servers{ flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; overflow-y:auto; }

.server{ width:46px; height:46px; border-radius:50%; background:#2a1748; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; font-size:12px; } .server:hover{background:#6a3df0}

.badge{ position:absolute; bottom:-3px; right:-3px; background:#6a3df0; font-size:10px; padding:2px 4px; border-radius:10px; }

.plusBtn{ width:46px; height:46px; border-radius:50%; background:#6a3df0; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; margin-top:10px; }

/* CHANNEL PANEL */ .channels{ width:240px; background:#2a1748; padding:10px; overflow-y:auto; display:block; transition:.3s; }

.channels.hidden{ width:0; padding:0; overflow:hidden; }

.channel{ padding:8px; border-radius:6px; cursor:pointer; margin:4px 0; } .channel:hover{background:#6a3df0}

/* CHAT */ .chat{ flex:1; display:flex; flex-direction:column; }

.messages{ flex:1; padding:15px; overflow-y:auto; }

.message{ margin-bottom:10px; padding:8px; border-radius:8px; background:rgba(255,255,255,0.03); position:relative; }

.message:hover{background:rgba(255,255,255,0.06)}

.msg-actions{ position:absolute; right:8px; top:5px; cursor:pointer; }

.input{ padding:10px; background:#2a1748; display:flex; gap:8px; }

.input input{ flex:1; padding:12px; border:none; border-radius:8px; background:#1a0f2e; color:#fff; }

.input button{ background:#6a3df0; border:none; color:#fff; padding:10px 14px; border-radius:8px; cursor:pointer; }

/* USERS */ .users{ width:220px; background:#2a1748; padding:10px; overflow-y:auto; }

.user{padding:5px;border-radius:6px;margin:4px 0} .admin{color:#ff6bff} .member{color:#b084ff}

/* MODAL */ .modal{ position:fixed; top:0;left:0; width:100%;height:100%; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; }

.modal-content{ background:#2a1748; padding:20px; border-radius:10px; width:280px; }

.modal button{ width:100%; margin:5px 0; padding:10px; border:none; border-radius:6px; background:#6a3df0; color:#fff; cursor:pointer; }

@media(max-width:900px){ .channels,.users{display:none} .leftbar{width:80px} } </style>

</head>
<body><!-- LEFT BAR --><div class="leftbar"><div class="menuBtns">
<div class="menuBtn" onclick="showServers()">S</div>
<div class="menuBtn" onclick="showDM()">DM</div>
<div class="menuBtn" onclick="showFriends()">F</div>
<div class="menuBtn" onclick="showProfile()">P</div>
</div><div class="servers" id="serverList"></div><div class="plusBtn" onclick="openCreateModal()">+</div></div><!-- CHANNELS --><div class="channels" id="channels"></div><!-- CHAT --><div class="chat">
<div class="messages" id="messages"></div>
<div class="input">
<input id="msgInput" placeholder="Mesaj yaz...">
<button onclick="sendMsg()">Gönder</button>
</div>
</div><!-- USERS --><div class="users" id="users"></div><!-- MODAL --><div class="modal" id="modal">
<div class="modal-content">
<h3 id="modalTitle">Sunucu</h3>
<button onclick="alert('Sunucudan çıkıldı')">Sunucudan Çık</button>
<button id="memberCount"></button>
<button id="activeCount"></button>
<button onclick="closeModal()">Kapat</button>
</div>
</div><!-- CREATE MODAL --><div class="modal" id="createModal">
<div class="modal-content">
<h3>Sunucu Oluştur / Katıl</h3>
<button onclick="alert('Sunucu oluşturuldu')">Sunucu Oluştur</button>
<button onclick="alert('Kod ile katıldın')">Kod ile Katıl</button>
<button onclick="closeCreateModal()">Kapat</button>
</div>
</div><script>
let currentServer=0;
let currentChannel="genel";
let currentView="server";

const servers=[
{name:"Nexora Hub",badge:5,channels:["genel","sohbet"],users:genUsers(15),messages:{"genel":[{user:"Admin",role:"admin",text:"Hoşgeldiniz"},{user:"Ali",role:"member",text:"Selam"}]}},
{name:"Oyun Dünyası",badge:3,channels:["valorant","lol"],users:genUsers(12),messages:{"valorant":[{user:"Efe",role:"member",text:"Rank atalım"}]}},
{name:"Kod Topluluğu",badge:7,channels:["js","html"],users:genUsers(18),messages:{"js":[{user:"Dev",role:"admin",text:"JS öğreniyorum"}]}}
];

function genUsers(n){let a=[];for(let i=0;i<n;i++)a.push({name:"User"+i,role:i%4==0?"admin":"member"});return a;}

function renderServers(){
let html="";
servers.forEach((s,i)=>{
html+=`<div class='server' onclick='loadServer(${i})'>${s.name[0]}<div class='badge'>${s.badge}</div></div>`;
});
document.getElementById("serverList").innerHTML=html;
}

function loadServer(i){
currentServer=i;
renderChannels();
renderUsers();
loadChannel(servers[i].channels[0]);
}

function renderChannels(){
let s=servers[currentServer];
let html="<h3>Kanallar</h3>";
s.channels.forEach(c=>html+=`<div class='channel' onclick="loadChannel('${c}')"># ${c}</div>`);
document.getElementById("channels").innerHTML=html;
}

function loadChannel(name){
currentChannel=name;
let msgs=servers[currentServer].messages[name]||[];
let html="";
msgs.forEach(m=>{
html+=`<div class='message'><b class='${m.role}'>${m.user}</b>: ${m.text}<div class='msg-actions'>⋮</div></div>`;
});
document.getElementById("messages").innerHTML=html;
}

function sendMsg(){
let v=document.getElementById("msgInput").value;
if(!v)return;
servers[currentServer].messages[currentChannel].push({user:"Sen",role:"member",text:v});
document.getElementById("msgInput").value="";
loadChannel(currentChannel);
}

function renderUsers(){
let u=servers[currentServer].users;
let html="<h3>Kullanıcılar</h3>";
u.forEach(x=>html+=`<div class='user ${x.role}'>${x.name}</div>`);
document.getElementById("users").innerHTML=html;
}

/* VIEW BUTTONS */
function showServers(){loadServer(0)}
function showDM(){alert("DM açıldı")}
function showFriends(){alert("Arkadaşlar")}
function showProfile(){alert("Profil")}

/* MODALS */
function openCreateModal(){document.getElementById("createModal").style.display="flex"}
function closeCreateModal(){document.getElementById("createModal").style.display="none"}
function closeModal(){document.getElementById("modal").style.display="none"}

renderServers();loadServer(0);
</script></body>
</html>
