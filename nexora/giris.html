<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexora Giriş</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1a0f2e;
      color: white;
    }header {
  width: 100%;
  display: flex;
  align-items: center;
  padding: 15px 20px;
  background: #2a1748;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: #b084ff;
}

.container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: calc(100vh - 70px);
  padding: 20px;
}

.box {
  background: #2a1748;
  padding: 25px;
  border-radius: 12px;
  width: 100%;
  max-width: 350px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
  color: #b084ff;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  background: #1a0f2e;
  color: white;
}

.options {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 5px;
}

.options label {
  display: flex;
  align-items: center;
  gap: 5px;
}

.options a {
  color: #b084ff;
  text-decoration: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #6a3df0;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

.switch {
  text-align: center;
  margin-top: 15px;
  font-size: 13px;
}

.switch a {
  color: #b084ff;
  cursor: pointer;
}

.error {
  color: #ff6b6b;
  font-size: 12px;
  display: none;
}

  </style>
</head>
<body><header>
  <div class="logo">Nexora</div>
</header><div class="container">
  <div class="box"><h2 id="formTitle">Giriş Yap</h2>

<input type="text" id="username" placeholder="E-mail veya Kullanıcı Adı">
<input type="password" id="password" placeholder="Şifre">

<div class="options">
  <label><input type="checkbox"> Beni Hatırla</label>
  <a href="#">Şifremi unuttum</a>
</div>

<div class="error" id="errorMsg">Hatalı giriş bilgileri</div>

<button onclick="login()">Giriş Yap</button>

<div class="switch">
  Hesabın yok mu? <a onclick="switchMode()">Hemen kayıt ol</a>
</div>

  </div>
</div><script>
  let isLogin = true;

  function switchMode() {
    const title = document.getElementById('formTitle');
    const button = document.querySelector('button');

    isLogin = !isLogin;

    if (!isLogin) {
      title.innerText = 'Kayıt Ol';
      button.innerText = 'Kayıt Ol';
    } else {
      title.innerText = 'Giriş Yap';
      button.innerText = 'Giriş Yap';
    }
  }

  async function login() {
    const userInput = document.getElementById('username').value;
    const passInput = document.getElementById('password').value;
    const error = document.getElementById('errorMsg');

    const res = await fetch('users.json');
    const users = await res.json();

    const found = users.find(u => 
      (u.email === userInput || u.username === userInput) && u.password === passInput
    );

    if (found) {
      alert('Giriş başarılı!');
      window.location.href = 'app.html';
    } else {
      error.style.display = 'block';
    }
  }
</script></body>
  </html>
