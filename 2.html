<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak</title>
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
}.header{ height:250px; background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover; display:flex; flex-direction:column; justify-content:center; align-items:center; }

.header h1{ font-size:60px; margin:0; }

.header p{ margin:5px; font-size:18px; }

.cards{ display:flex; gap:15px; padding:15px; }

.card{ flex:1; background:#111827; border-radius:20px; padding:20px; text-align:center; }

.circle{ width:120px; height:120px; border-radius:50%; border:10px solid #1f2937; border-top:10px solid orange; display:flex; align-items:center; justify-content:center; margin:15px auto; font-size:22px; }

.grid{ display:grid; grid-template-columns: repeat(auto-fill,minmax(45px,1fr)); gap:6px; padding:15px; }

.day{ padding:8px; border-radius:6px; text-align:center; font-size:12px; cursor:pointer; }

.done{background:#22c55e;text-decoration:line-through;} .today{background:orange;} .future{background:#1f2937;}

</style>
</head>
<body><div class="header">
  <p>Şafak →</p>
  <h1 id="today">119</h1>
  <p>Atarsa → 118</p>
</div><div class="cards">
  <div class="card">
    <h3>Kalan Süre</h3>
    <div class="circle" id="remainCircle">118</div>
    <p id="remainText"></p>
  </div>
  <div class="card">
    <h3>Geçen Süre</h3>
    <div class="circle" id="passedCircle">0</div>
    <p id="passedText"></p>
  </div>
</div><div class="grid" id="grid"></div><script>
const total=180;
const today=119;
const izin= (1+6)-3;

const grid=document.getElementById('grid');

let doneCount=0;

for(let i=total;i>=1;i--){
  const d=document.createElement('div');
  d.className='day';
  d.innerText=i;

  if(i>today){
    d.classList.add('done');
    doneCount++;
  }
  else if(i===today){
    d.classList.add('today');
  }
  else{
    d.classList.add('future');
  }

  d.onclick=()=>{
    if(i!==today){
      d.classList.toggle('done');
      update();
    }
  }

  grid.appendChild(d);
}

function update(){
  doneCount=document.querySelectorAll('.done').length;
  const kalan= total - doneCount - izin;

  document.getElementById('remainCircle').innerText=kalan;
  document.getElementById('passedCircle').innerText=doneCount;

  document.getElementById('remainText').innerText= kalan + ' Gün';
  document.getElementById('passedText').innerText= doneCount + ' Gün';
}

update();
</script></body>
      </html>
