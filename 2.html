<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Şafak Karalama</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }h1 {
  margin-bottom: 10px;
}

.info {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
  gap: 8px;
  max-width: 900px;
  margin: auto;
}

.day {
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.1);
}

.done {
  background: #22c55e;
  text-decoration: line-through;
}

.today {
  background: #f59e0b;
}

.future {
  background: #334155;
}

.stats {
  margin: 20px;
  font-size: 18px;
}

  </style>
</head>
<body>  <h1>Şafak Karalama</h1>  <div class="info">
    <p>Sülüs Tarihi: 05.02.2026</p>
    <p>Toplam Gün: 180</p>
    <p>Yol İzni: 1 gün | Yasal İzin: 6 gün | Kullanılan: 3 gün</p>
  </div>  <div class="stats">
    <p id="remaining"></p>
    <p id="passed"></p>
  </div>  <div class="grid" id="grid"></div><script>

const totalDays = 180;
const izinToplam = 1 + 6;
const kullanilan = 3;
const dusulecek = izinToplam - kullanilan;

// Bugünün şafak hesabı
const todaySafak = 119; // BURAYI MANUEL DEĞİŞTİREBİLİRSİN

const grid = document.getElementById("grid");

for (let i = totalDays; i >= 1; i--) {
  const div = document.createElement("div");
  div.classList.add("day");
  div.innerText = i;

  if (i > todaySafak) {
    div.classList.add("done");
  } else if (i === todaySafak) {
    div.classList.add("today");
  } else {
    div.classList.add("future");
  }

  div.addEventListener("click", () => {
    if (i !== todaySafak) {
      div.classList.toggle("done");
      updateStats();
    }
  });

  grid.appendChild(div);
}

function updateStats() {
  const doneCount = document.querySelectorAll(".done").length;
  const kalan = totalDays - doneCount - dusulecek;

  document.getElementById("remaining").innerText = "Kalan Gün: " + kalan;
  document.getElementById("passed").innerText = "Geçen Gün: " + doneCount;
}

updateStats();

</script></body>
  </html>
