<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Cards</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff4d6d,#ff99ac);
  color:white;
  overflow:hidden;
}

header {
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.category {
  background:rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.category:hover {
  transform:scale(1.05);
}

#cardArea {
  position:relative;
  width:100%;
  height:65vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ANA KART */
.card {
  position:absolute;
  width:85%;
  padding:25px;
  border-radius:25px;
  text-align:center;
  font-size:20px;

  background: rgba(20, 0, 10, 0.95); /* OKUNAKLI */
  backdrop-filter: blur(10px);

  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  transition:0.4s;
}

/* ALT KARTLAR - SADECE GÖRSEL */
.card:nth-child(2) {
  transform: scale(0.95) translateY(10px);
  opacity:0.4;
  filter: blur(3px);
}

.card:nth-child(3) {
  transform: scale(0.9) translateY(20px);
  opacity:0.2;
  filter: blur(5px);
}

.buttons {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

.btn {
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.skip { background:#ff4d6d; }
.like { background:#00e676; }

</style>
</head>

<body>

<header id="title">Kategoriler</header>

<div class="container" id="home"></div>

<div id="questions" style="display:none;">
  <button onclick="goHome()">⬅</button>
  <div id="cardArea"></div>

  <div class="buttons">
    <button class="btn skip" onclick="swipeLeft()">✖</button>
    <button class="btn like" onclick="swipeRight()">❤</button>
  </div>
</div>

<script>

const data = {
"Cesur +18":[
"Kontrol sende mi olmalı yoksa bende mi?",
"Işıklar açık mı kapalı mı?",
"Yavaş mı hızlı mı?",
"Göz teması mı yoksa his mi?",
"Sürpriz mi planlı mı?",
"Dominant mı yoksa daha uyumlu musun?",
"Anı mı yaşarsın yoksa ortam mı önemli?",
"Risk almayı sever misin?"
],

"Cinsel Sorular":[
"Seni en çok ne başlatır?",
"Romantik ortam önemli mi?",
"Sınırların nerede başlıyor?",
"Spontane mi planlı mı?",
"Daha çok temas mı söz mü?",
"En çok ne seni etkiler?",
"Seni en çok ne heyecanlandırır?",
"Partnerin seni nasıl daha iyi anlayabilir?"
],

"Sert Sorular":[
"İlişkimiz güçleniyor mu?",
"Mutlu musun?",
"Gerçekten doğru kişi miyim?",
"Beni kaybetmekten korkuyor musun?",
"İlişkimizde eksik ne?",
"Gerçekten açık mısın bana?",
"Bir şeyleri zorluyor muyuz?",
"Hala aynı heyecan var mı?"
]
};

let current = [];
let index = 0;
let startX = 0;

const home = document.getElementById("home");

// kategori oluştur
for (let key in data) {
  let div = document.createElement("div");
  div.className = "category";
  div.innerText = key;
  div.onclick = () => openCategory(key);
  home.appendChild(div);
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function openCategory(name){
  current = shuffle([...data[name]]);
  index = 0;

  home.style.display="none";
  document.getElementById("questions").style.display="block";
  document.getElementById("title").innerText=name;

  renderStack();
}

function renderStack(){
  const area = document.getElementById("cardArea");
  area.innerHTML="";

  for(let i=0;i<3;i++){
    let q = current[index+i];
    if(!q) continue;

    let card = document.createElement("div");
    card.className="card";

    // SADECE ÜST KARTTA YAZI
    if(i === 0){
      card.innerText = q;
      addSwipe(card);
    } else {
      card.innerText = "";
    }

    area.appendChild(card);
  }
}

function addSwipe(card){

  card.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
  });

  card.addEventListener("touchmove",e=>{
    let moveX=e.touches[0].clientX-startX;
    card.style.transform=`translateX(${moveX}px) rotate(${moveX/10}deg)`;
  });

  card.addEventListener("touchend",e=>{
    let moveX=e.changedTouches[0].clientX-startX;

    if(moveX>120) swipeRight();
    else if(moveX<-120) swipeLeft();
    else card.style.transform="";
  });
}

function swipeRight(){
  animate(1);
}

function swipeLeft(){
  animate(-1);
}

function animate(dir){
  let card=document.querySelector(".card");

  card.style.transform=`translateX(${dir*600}px) rotate(${dir*30}deg)`;
  card.style.opacity="0";

  setTimeout(()=>{
    index++;
    if(index>=current.length) index=0;
    renderStack();
  },300);
}

function goHome(){
  home.style.display="block";
  document.getElementById("questions").style.display="none";
  document.getElementById("title").innerText="Kategoriler";
}

</script>

</body>
    </html>
