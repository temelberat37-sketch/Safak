<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Game</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#ff4d6d,#ff99ac);
  color:white;
  overflow:hidden;
}

header {
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.container {
  padding:15px;
}

.category {
  background:rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  padding:15px;
  margin:10px 0;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}

#cardArea {
  position:relative;
  width:100%;
  height:65vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ANA KART */
.card {
  position:absolute;
  width:85%;
  padding:25px;
  border-radius:25px;
  text-align:center;
  font-size:20px;
  background: rgba(20,0,10,0.95);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
  transition:0.4s;
}

/* ALT KARTLAR */
.card:nth-child(2){
  transform:scale(0.95) translateY(10px);
  opacity:0.4;
  filter:blur(3px);
}
.card:nth-child(3){
  transform:scale(0.9) translateY(20px);
  opacity:0.2;
  filter:blur(5px);
}

.controls {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:15px;
}

.btn {
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:22px;
  cursor:pointer;
}

.left { background:#ff4d6d; }
.right { background:#00e676; }

/* oyuncu gösterge */
.player {
  text-align:center;
  margin-top:5px;
  font-size:14px;
  opacity:0.8;
}

</style>
</head>

<body>

<header id="title">Kategoriler</header>

<div class="container" id="home"></div>

<div id="questions" style="display:none;">
  <button onclick="goHome()">⬅</button>

  <div class="player" id="playerInfo"></div>

  <div id="cardArea"></div>

  <div class="controls">
    <button class="btn left" onclick="prev()">⬅</button>
    <button class="btn right" onclick="next()">➡</button>
  </div>
</div>

<script>

const data = {
"Cesur +18":[
"Kontrol sende mi olmalı yoksa bende mi?",
"Işıklar açık mı kapalı mı?",
"Yavaş mı hızlı mı?",
"Göz teması mı yoksa his mi?",
"Sürpriz mi planlı mı?",
"Dominant mı yoksa daha uyumlu musun?",
"Risk almayı sever misin?"
],

"Cinsel Sorular":[
"Seni en çok ne başlatır?",
"Romantik ortam önemli mi?",
"Sınırların nerede başlıyor?",
"Spontane mi planlı mı?",
"Daha çok temas mı söz mü?",
"En çok ne seni etkiler?"
],

"Sert Sorular":[
"İlişkimiz güçleniyor mu?",
"Mutlu musun?",
"Gerçekten doğru kişi miyim?",
"Beni kaybetmekten korkuyor musun?",
"İlişkimizde eksik ne?"
]
};

let current = [];
let index = 0;
let startX = 0;

// 2 kişilik mod
let playerTurn = 1;

const home = document.getElementById("home");

for (let key in data) {
  let div = document.createElement("div");
  div.className = "category";
  div.innerText = key;
  div.onclick = () => openCategory(key);
  home.appendChild(div);
}

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

function openCategory(name){
  current = shuffle([...data[name]]);
  index = 0;
  playerTurn = 1;

  home.style.display="none";
  document.getElementById("questions").style.display="block";
  document.getElementById("title").innerText=name;

  updatePlayer();
  renderStack();
}

function updatePlayer(){
  document.getElementById("playerInfo").innerText =
    "Sıra: Oyuncu " + playerTurn;
}

function switchPlayer(){
  playerTurn = playerTurn === 1 ? 2 : 1;
  updatePlayer();
}

function renderStack(){
  const area = document.getElementById("cardArea");
  area.innerHTML="";

  for(let i=0;i<3;i++){
    let q = current[index+i];
    if(!q) continue;

    let card = document.createElement("div");
    card.className="card";

    if(i===0){
      card.innerText=q;
      addSwipe(card);
    }

    area.appendChild(card);
  }
}

function addSwipe(card){
  card.addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
  });

  card.addEventListener("touchmove",e=>{
    let moveX=e.touches[0].clientX-startX;
    card.style.transform=`translateX(${moveX}px) rotate(${moveX/10}deg)`;
  });

  card.addEventListener("touchend",e=>{
    let moveX=e.changedTouches[0].clientX-startX;

    if(moveX>120) next();
    else if(moveX<-120) prev();
    else card.style.transform="";
  });
}

function next(){
  animate(1);
}
function prev(){
  animate(-1);
}

function animate(dir){
  let card=document.querySelector(".card");

  card.style.transform=`translateX(${dir*600}px) rotate(${dir*30}deg)`;
  card.style.opacity="0";

  setTimeout(()=>{
    if(dir===1){
      index = (index+1) % current.length;
    } else {
      index = (index-1+current.length) % current.length;
    }

    switchPlayer(); // oyuncu değiştir
    renderStack();
  },300);
}

function goHome(){
  home.style.display="block";
  document.getElementById("questions").style.display="none";
  document.getElementById("title").innerText="Kategoriler";
}

</script>

</body>
  </html>
