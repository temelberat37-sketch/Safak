<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- servers -->
  <div class="servers">
    <div class="server">A</div>
    <div class="server">B</div>
    <div class="server add" onclick="createServer()">+</div>
  </div>

  <!-- sidebar -->
  <div class="sidebar">
    <div class="profile">
      <div class="avatar">👤</div>
      <div id="usernameDisplay"></div>
    </div>

    <div class="menu-item active">💬 DM</div>
    <div class="menu-item">👥 Arkadaşlar</div>

    <div class="friends" id="friends"></div>
  </div>

  <!-- main -->
  <div class="main">

    <div class="topbar">
      <h3>Mesajlar</h3>
      <button onclick="toggleTheme()">🌙</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <input id="message" placeholder="Mesaj yaz...">
      <button onclick="sendMessage()">Gönder</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
