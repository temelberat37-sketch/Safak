<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- SOL SUNUCULAR -->
  <div class="servers-bar">
    <div class="server">A</div>
    <div class="server">B</div>

    <div class="server add" onclick="createServer()">+</div>
  </div>

  <!-- SOL MENÜ (profil + arkadaşlar) -->
  <div class="sidebar">

    <div class="profile">
      <div class="avatar">👤</div>
      <div id="usernameDisplay"></div>
    </div>

    <div class="menu">
      <div class="menu-item active">💬 DM</div>
      <div class="menu-item">👥 Arkadaşlar</div>
    </div>

    <div class="friends-list" id="friends"></div>

  </div>

  <!-- ANA CHAT -->
  <div class="main">

    <div class="topbar">
      <h3 id="chatTitle">Mesajlar</h3>
      <button onclick="toggleTheme()">🌙</button>
    </div>

    <div id="chat"></div>

    <div class="chat-input">
      <input id="message" placeholder="Mesaj yaz...">
      <button onclick="sendMessage()">➤</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
