<!DOCTYPE html>
<html>
<head>
  <title>Chat Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">

<div class="center">
  <div class="card">
    <h2>Chat App</h2>

    <input id="username" placeholder="Kullanıcı adı">

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
