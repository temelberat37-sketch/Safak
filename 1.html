<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Takip</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.container{max-width:500px;margin:auto;padding:15px}

/* 🔥 MODERN BİLGİ KARTI */
.infoCard{
background:#1e293b;
border-radius:20px;
padding:15px;
margin-bottom:15px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.infoTitle{
font-size:18px;
margin-bottom:10px;
color:#38bdf8;
}

.infoGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.infoItem{
background:#0f172a;
padding:10px;
border-radius:12px;
text-align:center;
}

.infoItem span{
display:block;
font-size:12px;
color:#94a3b8;
}

.infoItem b{
font-size:16px;
}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.roleBtn{background:#334155;padding:6px 10px;border-radius:8px;cursor:pointer}

.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.day{padding:12px;border-radius:10px;background:#1e293b;text-align:center;cursor:pointer}
.day.done{color:#000;font-weight:bold}

.note{margin-top:10px}
textarea{width:100%;border-radius:8px;margin-top:5px;padding:8px;border:none}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}
.modal-box{background:#1e293b;padding:20px;border-radius:12px;text-align:center}

button{margin-top:10px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:#000;width:100%}
input{padding:10px;border-radius:8px;border:none;width:100%;margin-top:10px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:8px}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
<h3>🪖 Şafak</h3>
<div class="roleBtn" onclick="openModal()" id="roleText">Ziyaretçi</div>
</div>

<!-- 🔥 YENİ MODERN KART -->
<div class="infoCard">
<div class="infoTitle">Şafak Bilgisi</div>

<div class="infoGrid">
<div class="infoItem">
<span>Geçen</span>
<b id="passed">0</b>
</div>

<div class="infoItem">
<span>Kalan</span>
<b id="remaining">0</b>
</div>

<div class="infoItem">
<span>Yüzde</span>
<b id="percent">%0</b>
</div>

<div class="infoItem">
<span>Terhis</span>
<b id="discharge">-</b>
</div>

<div class="infoItem" style="grid-column: span 2;">
<span>Sülüs Tarihi</span>
<b>05 Şubat 2026</b>
</div>
</div>
</div>

<div id="grid" class="grid"></div>
<div id="notes"></div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">

<h3>Giriş Seç</h3>
<button onclick="askerSec()">🪖 Asker Girişi</button>
<button onclick="ziyaretciSec()">👀 Ziyaretçi Girişi</button>

<div id="passBox" style="display:none">
<input type="password" id="pass" placeholder="Şifre gir">
<button onclick="checkPass()">Giriş</button>
<p id="error" style="color:red"></p>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"safakasayar.firebaseapp.com",
databaseURL:"https://safakasayar-default-rtdb.firebaseio.com",
projectId:"safakasayar"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const total=180;
const startDate = new Date("2026-02-05");

let isAdmin=false;

const grid=document.getElementById("grid");
const notesDiv=document.getElementById("notes");

// 🔥 HESAPLAMA
function getPassedDays(){
let today=new Date();
let diff=Math.floor((today-startDate)/(1000*60*60*24));
return diff<0?0:diff;
}

function updateStats(){
let passed=getPassedDays();
let remaining=total-passed;
let percent=Math.floor((passed/total)*100);

let discharge=new Date(startDate);
discharge.setDate(discharge.getDate()+total);

document.getElementById("passed").innerText=passed;
document.getElementById("remaining").innerText=remaining;
document.getElementById("percent").innerText="%"+percent;
document.getElementById("discharge").innerText=discharge.toLocaleDateString();
}

// 🔐 GİRİŞ
window.askerSec=()=>document.getElementById("passBox").style.display="block";

window.ziyaretciSec=()=>{
isAdmin=false;
document.getElementById("modal").style.display="none";
document.getElementById("roleText").innerText="Ziyaretçi";
init();
}

window.checkPass=()=>{
if(document.getElementById("pass").value==="1234"){
isAdmin=true;
document.getElementById("modal").style.display="none";
document.getElementById("roleText").innerText="Asker";
init();
}else{
document.getElementById("error").innerText="Yanlış şifre";
}
}

window.openModal=()=>document.getElementById("modal").style.display="flex";

// 🎯 HIGHLIGHT
function scrollToNote(day){
const notes=document.querySelectorAll('.note');
notes.forEach(n=>n.style.border='none');

notes.forEach(n=>{
if(n.innerText.includes('Gün '+day)){
n.scrollIntoView({behavior:'smooth',block:'center'});
n.style.border='2px solid #22c55e';
setTimeout(()=>n.style.border='none',4000);
}
});
}

function init(){
grid.innerHTML="";
notesDiv.innerHTML="";

updateStats();

for(let i=total;i>=1;i--){

let d=document.createElement("div");
d.className="day";
d.innerText=i;
grid.appendChild(d);

let wrap=document.createElement("div");
wrap.className="note";

let title=document.createElement("b");
title.innerText="Gün "+i;

let ta=document.createElement("textarea");

wrap.appendChild(title);
wrap.appendChild(ta);
notesDiv.appendChild(wrap);

onValue(ref(db,"days/"+i),snap=>{
if(snap.val()){
d.classList.add("done");
d.style.background=`hsl(${(i*5)%360},70%,60%)`;
}else{
d.classList.remove("done");
d.style.background="#1e293b";
}
});

onValue(ref(db,"notes/"+i),snap=>{
let val=snap.val()||"";

if(isAdmin){
ta.value=val;
}else{
if(val!==""){
ta.value=val;
ta.disabled=true;
ta.style.color="#fff";
}else{
wrap.style.display="none";
}
}
});

if(isAdmin){
d.onclick=()=>set(ref(db,"days/"+i),!d.classList.contains("done"));
ta.oninput=()=>set(ref(db,"notes/"+i),ta.value);
}else{
d.onclick=()=>{
onValue(ref(db,"notes/"+i),snap=>{
if(snap.val()){
scrollToNote(i);
}else{
alert("Bu gün için not yok ❌");
}
},{onlyOnce:true});
}
}

}
}
</script>

</body>
  </html>
