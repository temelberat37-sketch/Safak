<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Takip</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.container{max-width:500px;margin:auto;padding:15px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.roleBtn{background:#334155;padding:6px 10px;border-radius:8px;cursor:pointer}
.noteBtn{background:#facc15;color:#000;padding:6px 10px;border-radius:8px;margin-left:5px;display:none}
.noteBtn.active{background:#f87171}
.stats{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.day{padding:12px;border-radius:10px;background:#1e293b;text-align:center;cursor:pointer}
.day.done{color:#000;font-weight:bold}
.note{margin-top:10px}
textarea{width:100%;border-radius:8px;margin-top:5px;padding:8px;border:none}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}
.modal-box{background:#1e293b;padding:20px;border-radius:12px;text-align:center}
button{margin-top:10px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:#000;width:100%}
input{padding:10px;border-radius:8px;border:none;width:100%;margin-top:10px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<div class="topbar">
<h3>🪖 Şafak</h3>
<div>
<span class="roleBtn" onclick="openModal()" id="roleText">Ziyaretçi</span>
<span class="noteBtn" id="visitorNoteBtn" onclick="openVisitorNote()">📩 Not</span>
</div>
</div>
<div class="stats">
<span id="passed">0</span>
<span id="remaining">0</span>
<span id="percent">%0</span>
</div>
<div id="grid" class="grid"></div>
<div id="notes"></div>
</div><!-- GİRİŞ --><div id="modal" class="modal">
<div class="modal-box">
<h3>Giriş Seç</h3>
<button onclick="askerSec()">🪖 Asker</button>
<button onclick="ziyaretciSec()">👀 Ziyaretçi</button>
<div id="passBox" style="display:none">
<input type="password" id="pass" placeholder="Şifre">
<button onclick="checkPass()">Giriş</button>
<p id="error"></p>
</div>
<div id="nameBox" style="display:none">
<input type="text" id="visitorName" placeholder="Adın">
<button onclick="saveVisitor()">Devam</button>
</div>
</div>
</div><!-- ZİYARETÇİ NOT --><div id="visitorModal" class="modal" style="display:none">
<div class="modal-box">
<h3>Asker için not bırak</h3>
<textarea id="visitorMsg"></textarea>
<button onclick="sendVisitorNote()">Gönder</button>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSy...",authDomain:"safakasayar.firebaseapp.com",databaseURL:"https://safakasayar-default-rtdb.firebaseio.com",projectId:"safakasayar"};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let isAdmin=false;
let visitorName="";

window.askerSec=()=>document.getElementById("passBox").style.display="block";
window.ziyaretciSec=()=>document.getElementById("nameBox").style.display="block";

window.saveVisitor=()=>{
visitorName=document.getElementById("visitorName").value;
document.getElementById("modal").style.display="none";
document.getElementById("roleText").innerText="Ziyaretçi";
document.getElementById("visitorNoteBtn").style.display="inline-block";
};

window.checkPass=()=>{
if(document.getElementById("pass").value==="1234"){
isAdmin=true;
document.getElementById("modal").style.display="none";
document.getElementById("roleText").innerText="Asker";
document.getElementById("visitorNoteBtn").style.display="inline-block";
listenVisitorNotes();
}else document.getElementById("error").innerText="Yanlış";
};

window.openModal=()=>document.getElementById("modal").style.display="flex";

function toast(msg){let t=document.createElement("div");t.className="toast";t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

// ziyaretçi not gönder
window.openVisitorNote=()=>document.getElementById("visitorModal").style.display="flex";
window.sendVisitorNote=()=>{
let msg=document.getElementById("visitorMsg").value;
set(ref(db,"visitorNotes/"+Date.now()),{name:visitorName,msg:msg});
document.getElementById("visitorModal").style.display="none";
toast("Gönderildi ✅");
};

// asker not dinleme
function listenVisitorNotes(){
const btn=document.getElementById("visitorNoteBtn");
onValue(ref(db,"visitorNotes"),snap=>{
if(snap.exists()){
btn.classList.add("active");
btn.onclick=()=>{
alert(JSON.stringify(snap.val(),null,2));
btn.classList.remove("active");
set(ref(db,"visitorNotes"),null);
}
}
});
}
</script></body>
  </html>
