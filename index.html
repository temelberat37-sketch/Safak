<!DOCTYPE html><html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Takip</title>
<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:#fff}
.container{max-width:500px;margin:auto;padding:15px}
h1{text-align:center}
.stats{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.day{padding:12px;border-radius:10px;background:#1e293b;text-align:center;font-size:14px;cursor:pointer}
.day.done{color:#000;font-weight:bold}
textarea{width:100%;border-radius:8px;margin-top:5px;padding:8px;border:none}
.note{margin-top:15px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center}
.modal-box{background:#1e293b;padding:20px;border-radius:12px;text-align:center}
input{padding:10px;border-radius:8px;border:none;width:100%;margin-top:10px}
button{margin-top:10px;padding:10px;border:none;border-radius:8px;background:#22c55e;color:#000;font-weight:bold}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:8px}
</style>
</head>
<body>
<div class="container">
<h1>🪖 Şafak Takip</h1>
<div class="stats">
<span id="passed">Geçen: 0</span>
<span id="remaining">Kalan: 180</span>
<span id="percent">%0</span>
</div>
<div id="grid" class="grid"></div>
<div id="notes"></div>
</div><div id="modal" class="modal">
<div class="modal-box">
<h3>Şifre Gir</h3>
<input type="password" id="pass">
<button onclick="checkPass()">Giriş</button>
<p id="error" style="color:red"></p>
</div>
</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyCj2K_FUSgUxI0iDyWXdPmsCZSmUveYsRI",authDomain:"safakasayar.firebaseapp.com",databaseURL:"https://safakasayar-default-rtdb.firebaseio.com",projectId:"safakasayar"};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const total=180;
const grid=document.getElementById("grid");
const notesDiv=document.getElementById("notes");
let isAdmin=false;
const adminPassword="1234";
let doneCount=0;

window.checkPass=function(){
let val=document.getElementById("pass").value;
if(val===""){
isAdmin=false;
document.getElementById("modal").style.display="none";
init();
}else if(val===adminPassword){
isAdmin=true;
document.getElementById("modal").style.display="none";
init();
}else{
document.getElementById("error").innerText="Yanlış şifre!";
}
}

function toast(msg){
let t=document.createElement("div");
t.className="toast";
t.innerText=msg;
document.body.appendChild(t);
setTimeout(()=>t.remove(),2000);
}

function getColor(i){return `hsl(${(i*5)%360},70%,60%)`}

function updateStats(){
let passed=doneCount;
let remaining=total-passed;
let percent=Math.floor((passed/total)*100);
document.getElementById("passed").innerText="Geçen: "+passed;
document.getElementById("remaining").innerText="Kalan: "+remaining;
document.getElementById("percent").innerText="%"+percent;
}

function init(){
for(let i=total;i>=1;i--){
let d=document.createElement("div");
d.className="day";
d.innerText=i;

onValue(ref(db,"days/"+i),snap=>{
if(snap.val()){
if(!d.classList.contains("done")) doneCount++;
d.classList.add("done");
d.style.background=getColor(i);
}else{
if(d.classList.contains("done")) doneCount--;
d.classList.remove("done");
d.style.background="#1e293b";
}
updateStats();
});

if(isAdmin){
d.onclick=()=>set(ref(db,"days/"+i),!d.classList.contains("done"));
}else{
d.onclick=()=>toast("Sadece izliyorsun 👀");
}

grid.appendChild(d);

let wrap=document.createElement("div");
wrap.className="note";
wrap.innerHTML=`<b>Gün ${i}</b>`;
let ta=document.createElement("textarea");

onValue(ref(db,"notes/"+i),snap=>{
ta.value=snap.val()||"";
});

if(isAdmin){
ta.oninput=()=>set(ref(db,"notes/"+i),ta.value);
}else ta.disabled=true;

wrap.appendChild(ta);
notesDiv.appendChild(wrap);
}
}
</script></body>
</html>
