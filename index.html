<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Sayar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  color: white;
  text-align: center;
}

.overlay {
  background: rgba(0,0,0,0.5);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  margin-top: 10px;
}

#safak {
  font-size: 120px;
  font-weight: bold;
  margin: 20px 0;
}

.card {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 20px;
  margin: 10px;
  display: inline-block;
  width: 40%;
}

.progress {
  width: 80%;
  height: 20px;
  background: #ddd;
  border-radius: 10px;
  margin: 20px auto;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: orange;
  width: 0%;
}

input {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #007bff;
  color: white;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Şafak Sayar</h1>

<!-- Giriş -->
<div>
  <input type="date" id="baslangic">
  <input type="number" id="gun" placeholder="Toplam Gün (örn: 180)">
  <button onclick="hesapla()">Hesapla</button>
</div>

<!-- Şafak -->
<div id="safak">---</div>
<div id="mesaj"></div>

<!-- Kartlar -->
<div>
  <div class="card">
    <h3>Kalan Süre</h3>
    <p id="kalan">0 Gün</p>
  </div>

  <div class="card">
    <h3>Geçen Süre</h3>
    <p id="gecen">0 Gün</p>
  </div>
</div>

<!-- Progress -->
<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="oran">%0</div>

</div>

<script>

function hesapla() {

  const baslangic = new Date(document.getElementById("baslangic").value);
  const toplamGun = parseInt(document.getElementById("gun").value);

  const bugun = new Date();

  const gecenGun = Math.floor((bugun - baslangic) / (1000*60*60*24));
  const kalanGun = toplamGun - gecenGun;

  const yuzde = (gecenGun / toplamGun) * 100;

  document.getElementById("safak").innerText = kalanGun;
  document.getElementById("kalan").innerText = kalanGun + " Gün";
  document.getElementById("gecen").innerText = gecenGun + " Gün";
  document.getElementById("oran").innerText = "%" + yuzde.toFixed(1);

  document.getElementById("bar").style.width = yuzde + "%";

  document.getElementById("mesaj").innerText = "Atarsa " + (kalanGun - 1);
}

// Sayfa açılınca otomatik hesaplasın
setInterval(hesapla, 60000);

</script>

</body>
  </html>
