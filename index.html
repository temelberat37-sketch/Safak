<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Sayar</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center/cover;
  color: white;
  text-align: center;
}

.overlay {
  background: rgba(0,0,0,0.5);
  min-height: 100vh;
  padding: 20px;
}

h1 {
  margin-top: 10px;
}

#isim {
  font-size: 20px;
  opacity: 0.8;
}

#safak {
  font-size: 120px;
  font-weight: bold;
  margin: 20px 0;
}

#atarsa {
  font-size: 20px;
  margin-bottom: 20px;
}

.card {
  background: white;
  color: black;
  border-radius: 15px;
  padding: 20px;
  margin: 10px;
  display: inline-block;
  width: 40%;
}

.progress {
  width: 80%;
  height: 20px;
  background: #ddd;
  border-radius: 10px;
  margin: 20px auto;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: orange;
  width: 0%;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Şafak Sayar 2026</h1>
<div id="isim">Berat</div>

<div id="safak">...</div>
<div id="atarsa"></div>

<div>
  <div class="card">
    <h3>Kalan Süre</h3>
    <p id="kalan"></p>
  </div>

  <div class="card">
    <h3>Geçen Süre</h3>
    <p id="gecen"></p>
  </div>
</div>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<div id="oran"></div>

</div>

<script>

// SABİT BİLGİLER
const baslangic = new Date("2026-02-05");
const toplamGun = 180; // 6 ay
const kullanilanIzin = 3;

// TERHİS HESABI
const toplamGercekGun = toplamGun - kullanilanIzin;

function hesapla() {

  const bugun = new Date();

  const gecenGun = Math.floor((bugun - baslangic) / (1000*60*60*24));
  const kalanGun = toplamGercekGun - gecenGun;

  const yuzde = (gecenGun / toplamGercekGun) * 100;

  document.getElementById("safak").innerText = kalanGun;
  document.getElementById("atarsa").innerText = "Atarsa " + (kalanGun - 1);

  document.getElementById("kalan").innerText = kalanGun + " Gün";
  document.getElementById("gecen").innerText = gecenGun + " Gün";

  document.getElementById("oran").innerText = "%" + yuzde.toFixed(1) + " tamamlandı";

  document.getElementById("bar").style.width = yuzde + "%";
}

// SAYFA AÇILINCA ÇALIŞ
hesapla();

// HER DAKİKA GÜNCELLE
setInterval(hesapla, 60000);

</script>

</body>
  </html>
