<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Şafak Sayar</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

/* Başlık */
h1 {
  font-size: 22px;
  margin-bottom: 10px;
}

/* Büyük sayı */
#safak {
  font-size: 110px;
  font-weight: bold;
  margin: 10px 0;
}

/* Atarsa */
#atarsa {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 15px;
}

/* Kartlar */
.cards {
  display: flex;
  justify-content: space-between;
  gap: 10px;
}

.card {
  flex: 1;
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 15px;
}

.card h3 {
  font-size: 14px;
  margin-bottom: 5px;
}

.card p {
  font-size: 20px;
  font-weight: bold;
}

/* Progress */
.progress {
  margin: 20px 0;
  width: 100%;
  height: 18px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  width: 0%;
}

/* Geri Sayım */
.geri {
  background: rgba(255,255,255,0.1);
  border-radius: 15px;
  padding: 15px;
  text-align: left;
}

.geri h3 {
  color: #ff4d4d;
  margin-bottom: 10px;
}

.ok {
  color: #4caf50;
  margin-bottom: 4px;
}

.kaldi {
  color: #ff4d4d;
}
</style>

</head>

<body>

<div class="container">

<h1>Şafak Sayar</h1>

<div id="safak">...</div>
<div id="atarsa"></div>

<div class="cards">
  <div class="card">
    <h3>Kalan Gün</h3>
    <p id="kalan"></p>
  </div>
  <div class="card">
    <h3>Geçen Gün</h3>
    <p id="gecen"></p>
  </div>
</div>

<div class="progress">
  <div class="progress-bar" id="bar"></div>
</div>

<!-- GERİ SAYIM -->
<div class="geri">
  <h3>Geri Sayım</h3>
  <div id="liste"></div>
</div>

</div>

<script>

// SABİT
const baslangic = new Date("2026-02-05");
const toplamGun = 177;

function hesapla() {

  const bugun = new Date();

  const gecen = Math.floor((bugun - baslangic)/(1000*60*60*24));
  const kalan = toplamGun - gecen;

  const yuzde = (gecen / toplamGun) * 100;

  // Ana veriler
  document.getElementById("safak").innerText = kalan;
  document.getElementById("atarsa").innerText = "Atarsa " + (kalan - 1);

  document.getElementById("kalan").innerText = kalan;
  document.getElementById("gecen").innerText = gecen;

  document.getElementById("bar").style.width = yuzde + "%";

  // Geri sayım hedefleri
  const hedefler = [
    {isim:"Yüzler", gun:100},
    {isim:"İlk Ay Bitti", gun:150},
    {isim:"İkinci Ay Bitti", gun:120},
    {isim:"Çift Rakamlar", gun:99},
    {isim:"Plakalar", gun:81},
    {isim:"Son 2 Ay", gun:60},
    {isim:"Son 1 Ay", gun:30},
    {isim:"Tek Rakamlar", gun:9},
    {isim:"Şafak Doğan Güneş", gun:1}
  ];

  let html = "";

  hedefler.forEach(h => {
    if (kalan <= h.gun) {
      html += `<div class="ok">${h.isim} ✔</div>`;
    } else {
      html += `<div>${h.isim}: <span class="kaldi">${kalan - h.gun} gün kaldı</span></div>`;
    }
  });

  document.getElementById("liste").innerHTML = html;
}

hesapla();
setInterval(hesapla, 60000);

</script>

</body>
  </html>
