<!DOCTYPE html><html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Şafak Takip</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; }
    .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; max-width:420px; margin:auto; }
    .day { background:#333; padding:10px; border-radius:6px; cursor:pointer; }
    .done { background:#2ecc71; color:#000; }
    .noteBox { margin:20px auto; max-width:420px; }
    textarea { width:100%; height:60px; margin-top:5px; }
  </style>
</head>
<body><h2>🪖 Şafak Takip</h2>
<div id="grid" class="grid"></div>
<div class="noteBox" id="notes"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCj2K_FUSgUxI0iDyWXdPmsCZSmUveYsRI",
  authDomain: "safakasayar.firebaseapp.com",
  databaseURL: "https://safakasayar-default-rtdb.firebaseio.com",
  projectId: "safakasayar",
  storageBucket: "safakasayar.firebasestorage.app",
  messagingSenderId: "865229978953",
  appId: "1:865229978953:web:0fb91576ffa5c82670ee98",
  measurementId: "G-DGFKBV4RQS"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const total = 119;
const grid = document.getElementById("grid");
const notesDiv = document.getElementById("notes");

const adminPassword = "1234";
let isAdmin = false;

const pass = prompt("Şifre gir (boş bırak = izleyici)");
if(pass === adminPassword) isAdmin = true;

for(let i=total;i>=1;i--){
  let d=document.createElement("div");
  d.className="day";
  d.innerText=i;

  onValue(ref(db, "days/"+i), snap=>{
    if(snap.val()) d.classList.add("done");
    else d.classList.remove("done");
  });

  if(isAdmin){
    d.onclick=()=>{
      set(ref(db, "days/"+i), !d.classList.contains("done"));
    }
  }

  grid.appendChild(d);

  let wrap=document.createElement("div");
  wrap.innerHTML=`<b>Gün ${i}</b>`;
  let ta=document.createElement("textarea");

  onValue(ref(db, "notes/"+i), snap=>{
    ta.value=snap.val()||"";
  });

  if(isAdmin){
    ta.onchange=()=>{
      set(ref(db, "notes/"+i), ta.value);
    }
  } else {
    ta.disabled=true;
  }

  wrap.appendChild(ta);
  notesDiv.appendChild(wrap);
}
</script></body>
                                        </html>
